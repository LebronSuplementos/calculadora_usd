<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transferencias — Lebron Suplementos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F0F2F5;color:#222;font-size:14px}
.app{max-width:980px;margin:0 auto;padding:16px}
.hdr{background:#1F3864;border-radius:8px;padding:14px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{color:#fff;font-size:15px;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600}
.badge-ok{background:#1E7145;color:#fff}
.badge-upd{background:#185FA5;color:#fff;cursor:pointer}
.tabs{display:flex;gap:4px;margin-bottom:14px}
.tab{padding:8px 20px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:13px;color:#555}
.tab.on{background:#1F3864;color:#fff;border-color:#1F3864}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:12px}
.fg{display:grid;grid-template-columns:130px 1fr 150px 125px auto;gap:8px;align-items:end}
@media(max-width:700px){.fg{grid-template-columns:1fr 1fr}}
label{font-size:11px;color:#666;display:block;margin-bottom:3px}
input{width:100%;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;color:#222}
input:focus{outline:none;border-color:#1F3864}
.btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.bp{background:#1F3864;color:#fff}
.bo{background:#F4B942;color:#1F3864}
.bs{padding:4px 10px;font-size:12px;background:transparent;border:1px solid #ccc;color:#555;cursor:pointer;border-radius:6px}
.bdel{border-color:#F09595;color:#A32D2D}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#555;border-bottom:2px solid #ddd;background:#F8F8F8;position:sticky;top:0;z-index:1}
td{padding:8px 10px;border-bottom:1px solid #eee}
tr:hover td{background:#FAFAFA}
.tt td{background:#F4B942!important;font-weight:600;color:#1F3864;border-top:2px solid #E0A000}
.num{text-align:right;font-variant-numeric:tabular-nums}
.sw{max-height:420px;overflow-y:auto;border-radius:6px;border:1px solid #ddd}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
@media(max-width:600px){.stats{grid-template-columns:1fr}}
.st{background:#EEF2F7;border-radius:6px;padding:12px}
.sl{font-size:11px;color:#666;margin-bottom:4px}
.sv{font-size:20px;font-weight:600;color:#1F3864}
.nd{text-align:center;padding:40px;color:#888}
.hint{font-size:11px;margin-top:6px;padding:5px 8px;border-radius:6px}
.hok{background:#EAF3DE;color:#2D6A1F}
.hwarn{background:#FEF3C7;color:#633806}
.mth{background:#1F3864!important;color:#fff!important}
.note{font-size:10px;color:#888;margin-top:8px;padding:6px 10px;border-radius:6px;background:#F8F8F8;border:1px solid #eee}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #eee}
</style>
</head>

const SK='lebron_real_v1';
let S={tab:'detalle',transfers:[],form:{fecha:'',desc:'',ars:'',tc:''},editId:null,nextId:1,lastUpdate:null};

function fmt(n,d=2){return n==null||isNaN(n)?'—':Number(n).toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fARS(n){return '$\u00A0'+fmt(n);}
function fUSD(n){return 'USD\u00A0'+fmt(n);}
function mAnio(f){if(!f)return'';const[y,m]=f.split('-');return m+'/'+y;}

function getTC(fecha){
  if(!fecha)return null;
  const k=fecha.substring(0,10);
  if(R[k])return R[k];
  const keys=Object.keys(R).filter(x=>x<=k).sort();
  return keys.length?R[keys[keys.length-1]]:null;
}

// Auto-actualizacion desde API BCRA (funciona en GitHub Pages via HTTPS)
async function actualizarBCRA(){
  try{
    const hoy=new Date().toISOString().split('T')[0];
    const url='https://api.bcra.gob.ar/estadisticascambiarias/v1.0/Cotizaciones/USD?fechaDesde=2022-01-03&fechaHasta='+hoy+'&limit=1000';
    const res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    let count=0;
    (data.results||[]).forEach(item=>{
      const tc=item.detalle?.[0]?.tipoCotizacion;
      if(item.fecha&&tc){R[item.fecha]=Math.round(parseFloat(tc)*100)/100;count++;}
    });
    // Recalcular USD de transferencias existentes con TCs auto
    S.transfers=S.transfers.map(t=>{
      if(!t.tcManual){const tc=getTC(t.fecha);return{...t,tc,usd:tc?t.ars/tc:null};}
      return t;
    });
    S.lastUpdate=new Date().toLocaleDateString('es-AR');
    saveSt();render();
    alert('Datos actualizados: '+count+' cotizaciones cargadas del BCRA.');
  }catch(e){
    alert('No se pudo conectar con el BCRA: '+e.message+'\nLos datos locales siguen activos.');
  }
}

function loadSt(){try{const s=JSON.parse(localStorage.getItem(SK)||'null');if(s){S.transfers=s.transfers||[];S.nextId=s.nextId||1;S.lastUpdate=s.lastUpdate||null;}}catch(e){}}
function saveSt(){try{localStorage.setItem(SK,JSON.stringify({transfers:S.transfers,nextId:S.nextId,lastUpdate:S.lastUpdate}));}catch(e){}}

function add(){
  const{fecha,desc,ars,tc}=S.form;
  if(!fecha||!ars||isNaN(parseFloat(ars)))return;
  const auto=getTC(fecha);
  const finalTC=tc?parseFloat(tc):auto;
  const t={id:S.editId||S.nextId++,fecha,desc,ars:parseFloat(ars),tc:finalTC,tcManual:!!tc,usd:finalTC?parseFloat(ars)/finalTC:null};
  if(S.editId){S.transfers=S.transfers.map(x=>x.id===S.editId?t:x);S.editId=null;}
  else S.transfers.push(t);
  S.form={fecha:'',desc:'',ars:'',tc:''};
  saveSt();render();
}
function del(id){if(!confirm('¿Borrar esta transferencia?'))return;S.transfers=S.transfers.filter(t=>t.id!==id);saveSt();render();}
function edit(id){const t=S.transfers.find(x=>x.id===id);if(!t)return;S.editId=id;S.form={fecha:t.fecha,desc:t.desc,ars:String(t.ars),tc:t.tcManual?String(t.tc):''};render();}
function cancel(){S.editId=null;S.form={fecha:'',desc:'',ars:'',tc:''};render();}

function exportCSV(){
  const rows=[['Fecha','Descripcion','Mes/Anio','Monto ARS','TC Oficial BCRA','Equivalente USD','TC Manual']];
  [...S.transfers].sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(t=>{
    rows.push([t.fecha,t.desc,mAnio(t.fecha),t.ars,t.tc||'',t.usd?t.usd.toFixed(2):'',t.tcManual?'Si':'No']);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='Transferencias_Lebron.csv';a.click();
}

function getMes(){
  const map={};
  S.transfers.forEach(t=>{const k=mAnio(t.fecha);if(!map[k])map[k]={mes:k,count:0,ars:0,usd:0,items:[]};map[k].count++;map[k].ars+=t.ars||0;map[k].usd+=t.usd||0;if(t.tc)map[k].items.push({tc:t.tc,ars:t.ars});});
  Object.values(map).forEach(m=>{const tot=m.items.reduce((s,x)=>s+x.ars,0);m.tcProm=tot?m.items.reduce((s,x)=>s+x.tc*x.ars,0)/tot:null;});
  return Object.values(map).sort((a,b)=>{const[ma,ya]=a.mes.split('/'),[mb,yb]=b.mes.split('/');return ya!==yb?ya-yb:ma-mb;});
}

function rForm(){
  const{fecha,desc,ars,tc}=S.form;
  const auto=getTC(fecha);
  return '<div class="card">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<span style="font-weight:600;font-size:13px">'+(S.editId?'Editar':'Nueva transferencia')+'</span>'
    +(S.editId?'<button class="bs" onclick="cancel()">Cancelar</button>':'')+'</div>'
    +'<div class="fg">'
    +'<div><label>Fecha</label><input type="date" value="'+fecha+'" onchange="S.form.fecha=this.value;render()"></div>'
    +'<div><label>Descripcion / Concepto</label><input type="text" value="'+desc+'" placeholder="A quien, motivo..." oninput="S.form.desc=this.value"></div>'
    +'<div><label>Monto ARS</label><input type="number" value="'+ars+'" placeholder="0.00" oninput="S.form.ars=this.value"></div>'
    +'<div><label>TC manual <span style="font-size:10px">(opcional)</span></label>'
    +'<input type="number" value="'+tc+'" placeholder="'+(auto?auto.toFixed(2):'sin fecha')+'" oninput="S.form.tc=this.value"></div>'
    +'<div><label>&nbsp;</label><button class="btn bp" onclick="add()">'+(S.editId?'Guardar':'Agregar')+'</button></div>'
    +'</div>'
    +(fecha&&auto&&!tc?'<div class="hint hok">TC '+fecha.split('-').reverse().join('/')+': $'+auto.toFixed(2)+' — BCRA Estadisticas Cambiarias (dato real)</div>':'')
    +(fecha&&!auto?'<div class="hint hwarn">Fecha sin cotizacion en la base. Ingresa el TC manualmente o presiona "Actualizar BCRA".</div>':'')
    +'</div>';
}

function rDetalle(){
  const sorted=[...S.transfers].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const totA=S.transfers.reduce((s,t)=>s+(t.ars||0),0);
  const totU=S.transfers.reduce((s,t)=>s+(t.usd||0),0);
  let h='<div class="stats">'
    +'<div class="st"><div class="sl">Transferencias</div><div class="sv">'+S.transfers.length+'</div></div>'
    +'<div class="st"><div class="sl">Total ARS</div><div class="sv" style="font-size:15px">'+fARS(totA)+'</div></div>'
    +'<div class="st"><div class="sl">Total USD oficial BCRA</div><div class="sv" style="font-size:15px">'+fUSD(totU)+'</div></div>'
    +'</div>'+rForm()
    +'<div class="card" style="padding:0">'
    +'<div class="toolbar"><span style="font-weight:600;font-size:13px">Registro de transferencias</span>'
    +'<button class="btn bo" onclick="exportCSV()">Exportar CSV</button></div>';
  if(sorted.length===0){h+='<div class="nd">Sin transferencias. Agrega la primera arriba.</div>';}
  else{
    h+='<div class="sw"><table><thead><tr><th>Fecha</th><th>Descripcion</th><th class="num">ARS</th><th class="num">TC BCRA</th><th class="num">USD</th><th></th></tr></thead><tbody>';
    sorted.forEach(t=>{
      h+='<tr><td>'+t.fecha.split('-').reverse().join('/')+'</td>'
        +'<td>'+(t.desc||'<span style="color:#aaa">—</span>')+'</td>'
        +'<td class="num">'+fARS(t.ars)+'</td>'
        +'<td class="num" style="color:'+(t.tcManual?'#185FA5':'#2D6A1F')+'">'+(t.tc?'$'+fmt(t.tc):'—')+'</td>'
        +'<td class="num">'+(t.usd?fUSD(t.usd):'—')+'</td>'
        +'<td style="display:flex;gap:4px;justify-content:flex-end">'
        +'<button class="bs" onclick="edit('+t.id+')">Editar</button>'
        +'<button class="bs bdel" onclick="del('+t.id+')">Borrar</button></td></tr>';
    });
    h+='<tr class="tt"><td colspan="2"><strong>TOTAL</strong></td><td class="num"><strong>'+fARS(totA)+'</strong></td><td></td><td class="num"><strong>'+fUSD(totU)+'</strong></td><td></td></tr>';
    h+='</tbody></table></div>';
  }
  h+='</div><div class="note">TC verde = dato real BCRA (estadisticascambiarias API) | TC azul = ingresado manualmente | Fuente: api.bcra.gob.ar/estadisticascambiarias/v1.0/Cotizaciones/USD</div>';
  return h;
}

function rResumen(){
  const meses=getMes();
  const totA=meses.reduce((s,m)=>s+m.ars,0);
  const totU=meses.reduce((s,m)=>s+m.usd,0);
  let h='<div class="stats">'
    +'<div class="st"><div class="sl">Meses con movimientos</div><div class="sv">'+meses.length+'</div></div>'
    +'<div class="st"><div class="sl">Total ARS</div><div class="sv" style="font-size:15px">'+fARS(totA)+'</div></div>'
    +'<div class="st"><div class="sl">Total USD oficial BCRA</div><div class="sv" style="font-size:15px">'+fUSD(totU)+'</div></div>'
    +'</div><div class="card" style="padding:0">'
    +'<div style="padding:10px 14px;border-bottom:1px solid #eee"><span style="font-weight:600;font-size:13px">Resumen mensual</span></div>';
  if(meses.length===0){h+='<div class="nd">Sin datos. Carga transferencias en Detalle.</div>';}
  else{
    h+='<table><thead><tr><th class="mth">Mes / Ano</th><th class="mth num">Cant.</th><th class="mth num">Total ARS</th><th class="mth num">TC prom. BCRA</th><th class="mth num">Total USD</th></tr></thead><tbody>';
    meses.forEach(m=>{
      h+='<tr><td><strong>'+m.mes+'</strong></td><td class="num">'+m.count+'</td>'
        +'<td class="num">'+fARS(m.ars)+'</td>'
        +'<td class="num">'+(m.tcProm?'$'+fmt(m.tcProm):'—')+'</td>'
        +'<td class="num">'+fUSD(m.usd)+'</td></tr>';
    });
    h+='<tr class="tt"><td><strong>GRAN TOTAL</strong></td><td class="num"><strong>'+meses.reduce((s,m)=>s+m.count,0)+'</strong></td>'
      +'<td class="num"><strong>'+fARS(totA)+'</strong></td><td>—</td><td class="num"><strong>'+fUSD(totU)+'</strong></td></tr>';
    h+='</tbody></table>';
  }
  h+='</div>';
  return h;
}

function render(){
  const n=Object.keys(R).length;
  document.getElementById('root').innerHTML=
    '<div class="hdr"><h1>Transferencias — Lebron Suplementos</h1>'
    +'<div class="hdr-right">'
    +(S.lastUpdate?'<span style="color:#aaa;font-size:11px">Actualizado: '+S.lastUpdate+'</span>':'')
    +'<span class="badge badge-ok">'+n+' cotizaciones BCRA reales</span>'
    +'<span class="badge badge-upd" onclick="actualizarBCRA()">Actualizar BCRA</span>'
    +'</div></div>'
    +'<div class="tabs">'
    +'<button class="tab '+(S.tab==='detalle'?'on':'')+'" onclick="S.tab=\'detalle\';render()">Detalle</button>'
    +'<button class="tab '+(S.tab==='resumen'?'on':'')+'" onclick="S.tab=\'resumen\';render()">Resumen por mes</button>'
    +'</div>'
    +(S.tab==='detalle'?rDetalle():rResumen());
}

loadSt();render();
</script>
</body>
</html>
